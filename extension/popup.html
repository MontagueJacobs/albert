<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AH Grocery Wrapped</title>
  <style>
    /* ============================================
       POPUP STYLES - Minimal and clean design
       ============================================ */
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      width: 300px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f8fafc;
      color: #1e293b;
    }
    
    /* Header section */
    .header {
      background: linear-gradient(135deg, #00a0e2 0%, #006bb3 100%);
      color: white;
      padding: 16px;
      text-align: center;
    }
    
    .header h1 {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 4px;
    }
    
    .header p {
      font-size: 12px;
      opacity: 0.9;
    }
    
    /* Main content */
    .content {
      padding: 16px;
    }
    
    /* Status message */
    .status {
      background: #e2e8f0;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 16px;
      font-size: 13px;
      text-align: center;
    }
    
    .status.success {
      background: #dcfce7;
      color: #166534;
    }
    
    .status.error {
      background: #fee2e2;
      color: #991b1b;
    }
    
    .status.warning {
      background: #fef3c7;
      color: #92400e;
    }
    
    /* Primary button */
    .btn-primary {
      width: 100%;
      padding: 14px 20px;
      background: linear-gradient(135deg, #00a0e2 0%, #006bb3 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.1s, box-shadow 0.1s;
    }
    
    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(0, 107, 179, 0.3);
    }
    
    .btn-primary:active {
      transform: translateY(0);
    }
    
    .btn-primary:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }
    
    /* Result display */
    .result {
      margin-top: 16px;
      display: none;
    }
    
    .result.visible {
      display: block;
    }
    
    .result-card {
      background: white;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      padding: 12px;
    }
    
    .result-card h3 {
      font-size: 14px;
      margin-bottom: 8px;
      color: #334155;
    }
    
    .result-card .count {
      font-size: 32px;
      font-weight: 700;
      color: #00a0e2;
    }
    
    .result-card .label {
      font-size: 12px;
      color: #64748b;
    }
    
    /* Footer info */
    .footer {
      padding: 12px 16px;
      background: #f1f5f9;
      font-size: 11px;
      color: #64748b;
      text-align: center;
      border-top: 1px solid #e2e8f0;
    }
    
    .footer a {
      color: #00a0e2;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <!-- Header -->
  <div class="header">
    <h1>🛒 AH Grocery Wrapped</h1>
    <p>Extract your purchase history</p>
  </div>
  
  <!-- Main content -->
  <div class="content">
    <!-- Status message -->
    <div id="status" class="status">
      Navigate to ah.nl and click the button below
    </div>
    
    <!-- Main action button -->
    <button id="extractBtn" class="btn-primary">
      🔍 Generate Wrapped
    </button>
    
    <!-- Results display -->
    <div id="result" class="result">
      <div class="result-card">
        <h3>Extraction Complete</h3>
        <div class="count" id="itemCount">0</div>
        <div class="label">items extracted</div>
      </div>
    </div>
  </div>
  
  <!-- Footer -->
  <div class="footer">
    Open the browser console (F12) to see full data
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
